name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10.14'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install "flet==0.21.2"
          pip install "requests"

      # 👇 重点：补丁升级版！完美兼容底层的错乱参数
      - name: Patch unicode bug (Advanced)
        run: |
          cat << 'EOF' > sitecustomize.py
          import builtins
          def mock_unicode(data, encoding='utf-8', errors='strict'):
              if encoding is None:
                  encoding = 'utf-8'
              if isinstance(data, bytes):
                  return data.decode(encoding, errors)
              return str(data)
          builtins.unicode = mock_unicode
          EOF
          echo "PYTHONPATH=$PWD" >> $GITHUB_ENV

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter 3.19.6
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          channel: 'stable'
          cache: true

      - name: Accept Android licenses
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Disable Flutter analytics
        run: flutter config --no-analytics

      - name: Build APK
        run: flet build apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: salary-apk
          path: build/apk/*.apk
